name: Daily Auto-Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install blake3

      - name: Run auto-updater
        run: python scripts/auto_update.py

      - name: Commit and push changes
        run: |
          git config user.name "GameVault Bot"
          git config user.email "bot@gamevault.dev"
          git add -A
          git diff --staged --quiet || git commit -m "Daily auto-update $(date +'%Y-%m-%d')"
          git push
